services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - backend/.env
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
